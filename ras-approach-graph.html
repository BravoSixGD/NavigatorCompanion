<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>RAS Approach Graph</title>

  <link rel="stylesheet" href="assets/theme.css">

  <style>
    .input-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .ship-section {
      margin-bottom: 18px;
    }

    .section-subtitle {
      font-size: clamp(16px, 3vw, 19px);
      font-weight: bold;
      color: var(--text-main);
      margin: 0 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-soft);
    }

    .unit-row {
      display: grid;
      grid-template-columns: 1fr 0.55fr;
      gap: 10px;
      align-items: end;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .summary-box {
      background: var(--bg-card);
      border: 1px solid var(--border-main);
      border-radius: 12px;
      padding: 14px;
      line-height: 1.5;
    }

    .summary-label {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 5px;
    }

    .summary-value {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: bold;
      color: var(--text-main);
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .action-btn {
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: 12px;
      color: var(--text-main);
      font-size: 18px;
      font-weight: bold;
      background: var(--primary);
      cursor: pointer;
    }

    .action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .graph-scroll {
      width: 100%;
      overflow: auto;
      margin-top: 16px;
      border: 1px solid var(--border-main);
      border-radius: 12px;
      background: var(--bg-input);
      padding: 10px;
    }

    .a4-sheet {
      width: 210mm;
      height: 297mm;
      background: #dff2d8;
      margin: 0 auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.45);
    }

    .ras-svg {
      display: block;
      width: 210mm;
      height: 297mm;
      background: #dff2d8;
    }

    .note {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
      margin-top: 12px;
    }

    @media (min-width: 760px) {
      .input-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .action-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }

      body * {
        visibility: hidden;
      }

      #printArea,
      #printArea * {
        visibility: visible;
      }

      #printArea {
        position: fixed;
        left: 0;
        top: 0;
        width: 210mm;
        height: 297mm;
        padding: 0;
        margin: 0;
        overflow: hidden;
        background: #dff2d8;
        box-shadow: none;
      }

      .a4-sheet {
        width: 210mm;
        height: 297mm;
        margin: 0;
        box-shadow: none;
      }

      .ras-svg {
        width: 210mm;
        height: 297mm;
      }
    }
  </style>
</head>

<body>
  <a
    href="index.html"
    class="home-btn"
    aria-label="Back to home"
  >×</a>

  <div class="app-container">
    <h1 class="page-title">RAS Approach Graph</h1>

    <div class="card">
      <div class="card-title">Inputs</div>

      <div class="ship-section">
        <div class="section-subtitle">Receiving Ship Data</div>

        <div class="input-grid">
          <div>
            <label>Length Overall of Receiving Ship (m)</label>
            <input id="rLOA" type="number" inputmode="decimal" step="0.1" placeholder="160">
          </div>

          <div>
            <label>Stem to Standard of Receiving Ship (m)</label>
            <input id="rStandard" type="number" inputmode="decimal" step="0.1" placeholder="45">
          </div>

          <div>
            <label>Stem to RAS Point of Receiving Ship (m)</label>
            <input id="rRAS" type="number" inputmode="decimal" step="0.1" placeholder="75">
          </div>

          <div>
            <label>Beam of Receiving Ship (m)</label>
            <input id="rBeam" type="number" inputmode="decimal" step="0.1" placeholder="22">
          </div>
        </div>
      </div>

      <div class="ship-section">
        <div class="section-subtitle">Delivery Ship Data</div>

        <div class="input-grid">
          <div>
            <label>Length Overall of Delivery Ship (m)</label>
            <input id="dLOA" type="number" inputmode="decimal" step="0.1" placeholder="200">
          </div>

          <div>
            <label>Stem to Standard of Delivery Ship (m)</label>
            <input id="dStandard" type="number" inputmode="decimal" step="0.1" placeholder="60">
          </div>

          <div>
            <label>Stem to RAS Point of Delivery Ship (m)</label>
            <input id="dRAS" type="number" inputmode="decimal" step="0.1" placeholder="90">
          </div>

          <div>
            <label>Beam of Delivery Ship (m)</label>
            <input id="dBeam" type="number" inputmode="decimal" step="0.1" placeholder="30">
          </div>
        </div>
      </div>

      <div class="ship-section">
        <div class="section-subtitle">RAS Approach Data</div>

        <div class="input-grid">
          <div>
            <label>RAS Speed K1 (kn)</label>
            <input id="rasSpeed" type="number" inputmode="decimal" step="0.1" placeholder="12">
          </div>

          <div>
            <label>Approach Speed K2 (kn)</label>
            <input id="approachSpeed" type="number" inputmode="decimal" step="0.1" placeholder="15">
          </div>

          <div>
            <label>Surge Rate of Receiving Ship (yards per kn)</label>
            <input id="surgeRate" type="number" inputmode="decimal" step="0.1" placeholder="80">
          </div>

          <div class="unit-row">
            <div>
              <label>Required Lateral Separation</label>
              <input id="lateralSeparation" type="number" inputmode="decimal" step="0.1" placeholder="60">
            </div>

            <div>
              <label>Unit</label>
              <select id="lateralUnit">
                <option value="m">m</option>
                <option value="ft">ft</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <button id="goBtn" class="go-btn" type="button">GO</button>

      <div class="action-grid">
        <button id="printBtn" class="action-btn" type="button" disabled>
          Print A4 Graph
        </button>

        <button id="saveBtn" class="action-btn" type="button" disabled>
          Save as Image
        </button>
      </div>

      <div id="result" class="result">
        Enter ship data and approach data to generate RAS graph.
      </div>
    </div>
  </div>

  <script>
    "use strict";

    const goBtn = document.getElementById("goBtn");
    const printBtn = document.getElementById("printBtn");
    const saveBtn = document.getElementById("saveBtn");
    const resultBox = document.getElementById("result");

    const inputIds = [
      "rLOA",
      "rStandard",
      "rRAS",
      "rBeam",
      "dLOA",
      "dStandard",
      "dRAS",
      "dBeam",
      "rasSpeed",
      "approachSpeed",
      "surgeRate",
      "lateralSeparation"
    ];

    document
      .querySelectorAll("input, select")
      .forEach((control) => {
        control.addEventListener("input", handleInputChange);
        control.addEventListener("change", handleInputChange);
      });

    goBtn.addEventListener("click", calculate);
    printBtn.addEventListener("click", printGraph);
    saveBtn.addEventListener("click", saveGraphAsImage);

    function handleInputChange() {
      updateButton();
      printBtn.disabled = true;
      saveBtn.disabled = true;
    }

    function valueOf(id) {
      return Number(document.getElementById(id).value);
    }

    function formatNumber(value, decimals = 2) {
      return Number(value).toFixed(decimals);
    }

    function formatMeters(value) {
      return `${formatNumber(value, 2)} m`;
    }

    function getInputs() {
      const lateralValue = valueOf("lateralSeparation");
      const lateralUnit = document.getElementById("lateralUnit").value;

      const lateralSeparationM =
        lateralUnit === "ft"
          ? lateralValue * 0.3048
          : lateralValue;

      return {
        receiving: {
          loa: valueOf("rLOA"),
          standard: valueOf("rStandard"),
          ras: valueOf("rRAS"),
          beam: valueOf("rBeam")
        },

        delivery: {
          loa: valueOf("dLOA"),
          standard: valueOf("dStandard"),
          ras: valueOf("dRAS"),
          beam: valueOf("dBeam")
        },

        rasSpeed: valueOf("rasSpeed"),
        approachSpeed: valueOf("approachSpeed"),
        surgeRateYardsPerKn: valueOf("surgeRate"),
        lateralSeparationM
      };
    }

    function getValidationMessage() {
      for (const id of inputIds) {
        const value = valueOf(id);

        if (!Number.isFinite(value)) {
          return "Complete all input fields.";
        }
      }

      const data = getInputs();
      const r = data.receiving;
      const d = data.delivery;

      if (r.loa <= 0 || d.loa <= 0) {
        return "Recheck LOA values.";
      }

      if (r.beam <= 0 || d.beam <= 0) {
        return "Recheck beam values.";
      }

      if (r.standard < 0 || r.standard > r.loa) {
        return "Recheck receiving ship stem to standard distance.";
      }

      if (d.standard < 0 || d.standard > d.loa) {
        return "Recheck delivery ship stem to standard distance.";
      }

      if (r.ras < 0 || r.ras > r.loa) {
        return "Recheck receiving ship stem to RAS point distance.";
      }

      if (d.ras < 0 || d.ras > d.loa) {
        return "Recheck delivery ship stem to RAS point distance.";
      }

      if (data.rasSpeed <= 0) {
        return "Recheck RAS speed K1.";
      }

      if (data.approachSpeed <= 0) {
        return "Recheck approach speed K2.";
      }

      if (data.approachSpeed <= data.rasSpeed) {
        return "Approach speed K2 must be greater than RAS speed K1.";
      }

      if (data.surgeRateYardsPerKn < 0) {
        return "Recheck surge rate.";
      }

      if (data.lateralSeparationM <= 0) {
        return "Recheck required lateral separation.";
      }

      return "";
    }

    function isValid() {
      return getValidationMessage() === "";
    }

    function updateButton() {
      goBtn.classList.toggle("valid", isValid());
    }

    function roundScaleUp(value) {
      if (value <= 0) return 1;

      let step = 0.5;

      if (value > 20) step = 1;
      if (value > 50) step = 2;
      if (value > 100) step = 5;

      return Math.ceil(value / step) * step;
    }

    function makeLine(x1, y1, x2, y2, stroke, width, dash = "") {
      return `
        <line
          x1="${x1}"
          y1="${y1}"
          x2="${x2}"
          y2="${y2}"
          stroke="${stroke}"
          stroke-width="${width}"
          ${dash ? `stroke-dasharray="${dash}"` : ""}
        />
      `;
    }

    function makeText(x, y, text, size, anchor = "middle", fill = "#111") {
      return `
        <text
          x="${x}"
          y="${y}"
          font-size="${size}"
          text-anchor="${anchor}"
          fill="${fill}"
          font-family="Arial, sans-serif"
        >${text}</text>
      `;
    }

    function renderGrid() {
      let grid = `
        <rect
          x="0"
          y="0"
          width="210"
          height="297"
          fill="#dff2d8"
        />
      `;

      for (let x = 0; x <= 210; x += 1) {
        const isMajor = x % 10 === 0;

        grid += makeLine(
          x,
          0,
          x,
          297,
          isMajor ? "#3b873b" : "#91c891",
          isMajor ? 0.18 : 0.06
        );
      }

      for (let y = 0; y <= 297; y += 1) {
        const isMajor = y % 10 === 0;

        grid += makeLine(
          0,
          y,
          210,
          y,
          isMajor ? "#3b873b" : "#91c891",
          isMajor ? 0.18 : 0.06
        );
      }

      return grid;
    }

    function shipPath(cx, stemY, loa, beam) {
      const shoulder = Math.min(loa * 0.10, beam * 1.25);
      const halfBeam = beam / 2;

      return `
        M ${cx} ${stemY}
        L ${cx + halfBeam} ${stemY + shoulder}
        L ${cx + halfBeam} ${stemY + loa}
        L ${cx - halfBeam} ${stemY + loa}
        L ${cx - halfBeam} ${stemY + shoulder}
        Z
      `;
    }

    function renderShip(options) {
      const {
        cx,
        stemY,
        loa,
        beam,
        standard,
        ras,
        label,
        rasSide,
        fill,
        stroke,
        dashed,
        opacity
      } = options;

      const halfBeam = beam / 2;
      const rasX = rasSide === "right" ? cx + halfBeam : cx - halfBeam;
      const rasY = stemY + ras;
      const standardY = stemY + standard;

      const rasLabelX = rasSide === "right" ? rasX + 5 : rasX - 5;
      const rasLabelAnchor = rasSide === "right" ? "start" : "end";

      return `
        <path
          d="${shipPath(cx, stemY, loa, beam)}"
          fill="${fill}"
          stroke="${stroke}"
          stroke-width="0.55"
          ${dashed ? `stroke-dasharray="2 1.5"` : ""}
          opacity="${opacity}"
        />

        ${makeLine(
          cx,
          stemY,
          cx,
          stemY + loa,
          stroke,
          0.25,
          "2 2"
        )}

        ${makeLine(
          cx - halfBeam,
          standardY,
          cx + halfBeam,
          standardY,
          stroke,
          0.25
        )}

        ${makeText(
          cx,
          stemY + loa + 7,
          label,
          4.2,
          "middle",
          stroke
        )}

        ${makeText(
          cx,
          standardY - 2,
          "STANDARD",
          3.1,
          "middle",
          stroke
        )}

        <circle
          cx="${rasX}"
          cy="${rasY}"
          r="1.4"
          fill="${stroke}"
          opacity="${opacity}"
        />

        ${makeText(
          rasLabelX,
          rasY - 3,
          "RAS POINT",
          3.1,
          rasLabelAnchor,
          stroke
        )}
      `;
    }

    function renderGraph(data) {
      const r = data.receiving;
      const d = data.delivery;

      const a4WidthMm = 210;
      const a4HeightMm = 297;
      const paddingMm = 12;

      const usableWidthCm = (a4WidthMm - (2 * paddingMm)) / 10;
      const usableHeightCm = (a4HeightMm - (2 * paddingMm)) / 10;

      const speedAdvantage = data.approachSpeed - data.rasSpeed;
      const surgeRateMPerKn = data.surgeRateYardsPerKn * 0.9144;
      const surgeDistance = surgeRateMPerKn * speedAdvantage;

      const centrelineSeparation =
        (r.beam / 2) +
        data.lateralSeparationM +
        (d.beam / 2);

      const receivingCx = 0;
      const deliveryCx = centrelineSeparation;

      const deliveryStemY = 0;
      const deliveryRasY = deliveryStemY + d.ras;

      const receivingFinalStemY = deliveryRasY - r.ras;
      const receivingOrderStemY = receivingFinalStemY + surgeDistance;

      const marginM = Math.max(
        10,
        Math.max(r.beam, d.beam, data.lateralSeparationM) * 0.35
      );

      const annotationMarginM = 20;

      const minX = Math.min(
        receivingCx - (r.beam / 2),
        deliveryCx - (d.beam / 2)
      ) - marginM - annotationMarginM;

      const maxX = Math.max(
        receivingCx + (r.beam / 2),
        deliveryCx + (d.beam / 2)
      ) + marginM + annotationMarginM;

      const minY = Math.min(
        deliveryStemY,
        receivingFinalStemY,
        receivingOrderStemY
      ) - marginM - annotationMarginM;

      const maxY = Math.max(
        deliveryStemY + d.loa,
        receivingFinalStemY + r.loa,
        receivingOrderStemY + r.loa
      ) + marginM + annotationMarginM;

      const graphWidthM = maxX - minX;
      const graphHeightM = maxY - minY;

      const rawScale = Math.max(
        graphWidthM / usableWidthCm,
        graphHeightM / usableHeightCm
      );

      const scaleMPerCm = roundScaleUp(rawScale * 1.02);

      const contentWidthMm = (graphWidthM / scaleMPerCm) * 10;
      const contentHeightMm = (graphHeightM / scaleMPerCm) * 10;

      const offsetX = (a4WidthMm - contentWidthMm) / 2;
      const offsetY = (a4HeightMm - contentHeightMm) / 2;

      function x(valueM) {
        return offsetX + ((valueM - minX) / scaleMPerCm) * 10;
      }

      function y(valueM) {
        return offsetY + ((valueM - minY) / scaleMPerCm) * 10;
      }

      function length(valueM) {
        return (valueM / scaleMPerCm) * 10;
      }

      const receivingRasXOrder = x(receivingCx + r.beam / 2);
      const receivingRasYOrder = y(receivingOrderStemY + r.ras);

      const receivingRasXFinal = x(receivingCx + r.beam / 2);
      const receivingRasYFinal = y(receivingFinalStemY + r.ras);

      const deliveryRasX = x(deliveryCx - d.beam / 2);
      const deliveryRasYmm = y(deliveryRasY);

      const lateralDimY = Math.max(22, deliveryRasYmm - 12);
      const surgeDimX = receivingRasXOrder + 20;

      const svg = `
        <svg
          id="rasSvg"
          class="ras-svg"
          xmlns="http://www.w3.org/2000/svg"
          width="210mm"
          height="297mm"
          viewBox="0 0 210 297"
        >
          <defs>
            <marker
              id="arrowEnd"
              markerWidth="5"
              markerHeight="5"
              refX="5"
              refY="2.5"
              orient="auto"
              markerUnits="strokeWidth"
            >
              <path d="M 0 0 L 5 2.5 L 0 5 Z" fill="#111" />
            </marker>

            <marker
              id="arrowStart"
              markerWidth="5"
              markerHeight="5"
              refX="0"
              refY="2.5"
              orient="auto"
              markerUnits="strokeWidth"
            >
              <path d="M 5 0 L 0 2.5 L 5 5 Z" fill="#111" />
            </marker>
          </defs>

          ${renderGrid()}

          ${renderShip({
            cx: x(deliveryCx),
            stemY: y(deliveryStemY),
            loa: length(d.loa),
            beam: length(d.beam),
            standard: length(d.standard),
            ras: length(d.ras),
            label: "Delivery ship",
            rasSide: "left",
            fill: "#fff3dc",
            stroke: "#1a1a1a",
            dashed: false,
            opacity: 1
          })}

          ${renderShip({
            cx: x(receivingCx),
            stemY: y(receivingFinalStemY),
            loa: length(r.loa),
            beam: length(r.beam),
            standard: length(r.standard),
            ras: length(r.ras),
            label: "Final position",
            rasSide: "right",
            fill: "#ffffff",
            stroke: "#555555",
            dashed: true,
            opacity: 0.65
          })}

          ${renderShip({
            cx: x(receivingCx),
            stemY: y(receivingOrderStemY),
            loa: length(r.loa),
            beam: length(r.beam),
            standard: length(r.standard),
            ras: length(r.ras),
            label: "Receiving ship",
            rasSide: "right",
            fill: "#dbeaff",
            stroke: "#1a1a1a",
            dashed: false,
            opacity: 1
          })}

          <line
            x1="${x(receivingCx + r.beam / 2)}"
            y1="${lateralDimY}"
            x2="${x(deliveryCx - d.beam / 2)}"
            y2="${lateralDimY}"
            stroke="#111"
            stroke-width="0.45"
            marker-start="url(#arrowStart)"
            marker-end="url(#arrowEnd)"
          />

          ${makeText(
            (x(receivingCx + r.beam / 2) + x(deliveryCx - d.beam / 2)) / 2,
            lateralDimY - 3,
            `Z = ${formatNumber(data.lateralSeparationM, 1)} m`,
            3.2
          )}

          <line
            x1="${surgeDimX}"
            y1="${receivingRasYOrder}"
            x2="${surgeDimX}"
            y2="${receivingRasYFinal}"
            stroke="#111"
            stroke-width="0.45"
            marker-start="url(#arrowStart)"
            marker-end="url(#arrowEnd)"
          />

          ${makeLine(
            receivingRasXOrder,
            receivingRasYOrder,
            surgeDimX,
            receivingRasYOrder,
            "#111",
            0.25,
            "2 2"
          )}

          ${makeLine(
            receivingRasXFinal,
            receivingRasYFinal,
            surgeDimX,
            receivingRasYFinal,
            "#111",
            0.25,
            "2 2"
          )}

          ${makeText(
            surgeDimX + 3,
            (receivingRasYOrder + receivingRasYFinal) / 2,
            `S = ${formatNumber(surgeDistance, 1)} m`,
            3.2,
            "start"
          )}

          ${makeLine(
            receivingRasXFinal,
            receivingRasYFinal,
            deliveryRasX,
            deliveryRasYmm,
            "#111",
            0.3,
            "2 2"
          )}

          <circle
            cx="${receivingRasXFinal}"
            cy="${receivingRasYFinal}"
            r="1.3"
            fill="none"
            stroke="#111"
            stroke-width="0.35"
            stroke-dasharray="1 1"
          />

          ${makeText(
            12,
            10,
            `Scale: 1 cm = ${formatNumber(scaleMPerCm, 2)} m`,
            4,
            "start"
          )}

          ${makeText(
            12,
            16,
            `1 mm = ${formatNumber(scaleMPerCm / 10, 2)} m`,
            3.2,
            "start"
          )}

          ${makeText(
            198,
            10,
            "RAS Approach Graph",
            4,
            "end"
          )}
        </svg>
      `;

      return {
        svg,
        surgeDistance,
        speedAdvantage,
        scaleMPerCm
      };
    }

    function showWarning(message) {
      resultBox.innerHTML =
        `<span class="warning">${message}</span>`;

      printBtn.disabled = true;
      saveBtn.disabled = true;
    }

    function calculate() {
      const validationMessage = getValidationMessage();

      if (validationMessage !== "") {
        showWarning(validationMessage);
        updateButton();
        return;
      }

      const data = getInputs();
      const graph = renderGraph(data);

      resultBox.innerHTML = `
        <div class="success">RAS approach graph generated.</div>

        <div class="summary-grid">
          <div class="summary-box">
            <div class="summary-label">Speed advantage</div>
            <div class="summary-value">${formatNumber(graph.speedAdvantage, 2)} kn</div>
          </div>

          <div class="summary-box">
            <div class="summary-label">Surge distance S</div>
            <div class="summary-value">${formatMeters(graph.surgeDistance)}</div>
          </div>
        </div>

        <div class="note">
          Order the receiving ship to come down to RAS speed when its RAS point is
          <strong>${formatMeters(graph.surgeDistance)}</strong> abaft the delivery ship RAS point.
          The dashed receiving ship shows the final position after surge.
        </div>

        <div class="graph-scroll">
          <div id="printArea" class="a4-sheet">
            ${graph.svg}
          </div>
        </div>

        <div class="note">
          A4 portrait graph generated. Scale used:
          1 cm = ${formatNumber(graph.scaleMPerCm, 2)} m.
        </div>
      `;

      printBtn.disabled = false;
      saveBtn.disabled = false;

      updateButton();
    }

    function printGraph() {
      const svg = document.getElementById("rasSvg");

      if (!svg) {
        showWarning("Generate the graph before printing.");
        return;
      }

      window.print();
    }

    function saveGraphAsImage() {
      const svg = document.getElementById("rasSvg");

      if (!svg) {
        showWarning("Generate the graph before saving.");
        return;
      }

      const serializer = new XMLSerializer();
      const svgText = serializer.serializeToString(svg);

      const svgBlob = new Blob(
        [svgText],
        {
          type: "image/svg+xml;charset=utf-8"
        }
      );

      const url = URL.createObjectURL(svgBlob);
      const image = new Image();

      image.onload = function () {
        const canvas = document.createElement("canvas");

        canvas.width = 2480;
        canvas.height = 3508;

        const context = canvas.getContext("2d");

        context.fillStyle = "#dff2d8";
        context.fillRect(0, 0, canvas.width, canvas.height);

        context.drawImage(
          image,
          0,
          0,
          canvas.width,
          canvas.height
        );

        URL.revokeObjectURL(url);

        const pngUrl = canvas.toDataURL("image/png");

        const downloadLink = document.createElement("a");
        downloadLink.href = pngUrl;
        downloadLink.download = "ras-approach-graph.png";

        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
      };

      image.src = url;
    }

    updateButton();
  </script>
</body>
</html>
